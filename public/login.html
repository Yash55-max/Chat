<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Auralis</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="login.css">
    <style>
        .toggle-mode {
            text-align: center;
            margin-top: 15px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }
        .toggle-mode a {
            color: var(--accent-orange);
            text-decoration: none;
            cursor: pointer;
        }
        .toggle-mode a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div style="display: flex; justify-content: space-between; align-items: center; width: 100%; max-width: 400px; position: absolute; top: 20px;">
            <a href="index.html" class="home-link" style="position: static;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
                Back to Home
            </a>
            <button class="theme-toggle-btn" style="background:none; border:none; color:var(--text-primary); cursor:pointer; width:24px; height:24px;"></button>
        </div>
        <div class="minimal-card">
            <h2 id="form-title">Welcome Back</h2>
            <p class="subtitle" id="form-subtitle">Sign in to continue to Auralis</p>
            <form id="login-form">
                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="you@example.com" required>
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="login-btn" id="submit-btn">Sign In</button>
                <button type="button" id="google-btn" class="google-btn">
                    <svg viewBox="0 0 24 24" width="20" height="20" xmlns="http://www.w3.org/2000/svg">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                    </svg>
                    Continue with Google
                </button>
            </form>
            <p class="toggle-mode" id="toggle-text">Don't have an account? <a id="toggle-btn">Sign Up</a></p>
        </div>
    </div>
    
    <script src="theme.js"></script>
    <script type="module" src="firebase-config.js"></script>
    <script type="module">
        import { auth } from './firebase-config.js';
        import { signInWithEmailAndPassword, createUserWithEmailAndPassword, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

        let isLoginMode = true;

        const toggleBtn = document.getElementById('toggle-btn');
        const formTitle = document.getElementById('form-title');
        const formSubtitle = document.getElementById('form-subtitle');
        const submitBtn = document.getElementById('submit-btn');
        const toggleText = document.getElementById('toggle-text');

        toggleBtn.addEventListener('click', () => {
            isLoginMode = !isLoginMode;
            if (isLoginMode) {
                formTitle.textContent = 'Welcome Back';
                formSubtitle.textContent = 'Sign in to continue to Auralis';
                submitBtn.textContent = 'Sign In';
                toggleText.innerHTML = `Don't have an account? <a id="toggle-btn">Sign Up</a>`;
            } else {
                formTitle.textContent = 'Welcome to Auralis';
                formSubtitle.textContent = 'Create an account to get started';
                submitBtn.textContent = 'Sign Up';
                toggleText.innerHTML = `Already have an account? <a id="toggle-btn">Sign In</a>`;
            }
            
            // Re-attach listener since we replaced innerHTML
            document.getElementById('toggle-btn').addEventListener('click', toggleBtn.click.bind(toggleBtn));
        });

        // Check if we came from the "Sign Up" button on the landing page
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('mode') === 'signup') {
            toggleBtn.click();
        }

        document.getElementById('login-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            submitBtn.textContent = 'Please wait...';
            submitBtn.disabled = true;

            try {
                if (isLoginMode) {
                    await signInWithEmailAndPassword(auth, email, password);
                } else {
                    await createUserWithEmailAndPassword(auth, email, password);
                }
                
                // Login/Signup successful, redirect
                window.location.href = '/chat.html';
                
            } catch (err) {
                alert('Authentication Error: ' + err.message);
                submitBtn.textContent = isLoginMode ? 'Sign In' : 'Sign Up';
                submitBtn.disabled = false;
            }
        });

        // Google Sign-In
        const googleBtn = document.getElementById('google-btn');
        googleBtn.addEventListener('click', async () => {
            const provider = new GoogleAuthProvider();
            googleBtn.textContent = 'Please wait...';
            googleBtn.disabled = true;
            try {
                await signInWithPopup(auth, provider);
                window.location.href = '/chat.html';
            } catch (err) {
                alert('Google Sign-In Error: ' + err.message);
                googleBtn.innerHTML = `
                    <svg viewBox="0 0 24 24" width="20" height="20" xmlns="http://www.w3.org/2000/svg">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                    </svg>
                    Continue with Google
                `;
                googleBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
