<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auralis AI</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <button id="new-chat-btn" class="new-chat-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    New Chat
                </button>
            </div>
            <div class="sidebar-history" id="history-list">
                <!-- History items will be injected here -->
            </div>
            <div class="sidebar-footer">
                <button id="profile-btn" class="profile-btn" title="Profile">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                    Profile
                </button>
                <button class="theme-toggle-btn profile-btn" title="Toggle Theme" data-text="Theme" style="display:flex; align-items:center; justify-content:flex-start;">
                    <!-- SVG gets injected by theme.js -->
                </button>
                <button id="logout-btn" class="logout-btn" title="Logout">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg>
                    Log Out
                </button>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <div class="chat-container">
            <button id="toggle-sidebar-btn" class="icon-btn toggle-sidebar-btn" title="Toggle Sidebar">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                    <line x1="9" y1="3" x2="9" y2="21"></line>
                </svg>
            </button>

            <div id="empty-view" class="empty-state">
                <h1>
                    <svg class="sparkle-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z" fill="none" />
                        <path d="M12 2l-3 4h6zM9 8l-2 3h10l-2-3z" fill="currentColor" />
                    </svg>
                    <span id="greeting-text">How can I help you today?</span>
                </h1>

                <div class="composer-wrapper">
                    <div class="composer">
                        <form id="chat-form">
                            <textarea id="message-input" rows="1" placeholder="How can I help you today?"></textarea>
                            <div id="image-staging" class="image-staging hidden">
                                <img id="staged-image" src="" alt="Staged image" />
                                <button type="button" id="remove-image-btn" class="remove-image-btn"
                                    title="Remove image">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <line x1="18" y1="6" x2="6" y2="18"></line>
                                        <line x1="6" y1="6" x2="18" y2="18"></line>
                                    </svg>
                                </button>
                            </div>
                            <div class="composer-toolbar">
                                <div class="toolbar-left">
                                    <label for="image-upload" class="icon-btn" title="Add Image">
                                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                            stroke-linecap="round" stroke-linejoin="round">
                                            <line x1="12" y1="5" x2="12" y2="19"></line>
                                            <line x1="5" y1="12" x2="19" y2="12"></line>
                                        </svg>
                                    </label>
                                    <input type="file" id="image-upload" accept="image/*" hidden />
                                </div>
                                <div class="toolbar-right">
                                    <button type="submit" id="send-btn">
                                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                            stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
                                            <line x1="12" y1="19" x2="12" y2="5"></line>
                                            <polyline points="5 12 12 5 19 12"></polyline>
                                        </svg>
                                    </button>
                                </div>
                            </div>
                        </form>
                    </div>
                    <p class="disclaimer">AI can make mistakes. Please double-check responses.</p>
                </div>

                <div class="mode-tabs">
                    <button class="mode-chip" data-mode="code">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="16 18 22 12 16 6"></polyline>
                            <polyline points="8 6 2 12 8 18"></polyline>
                        </svg>
                        Code
                    </button>
                    <button class="mode-chip" data-mode="research">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8"></circle>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                        </svg>
                        Research
                    </button>
                </div>
            </div>

            <main class="chat-messages" id="chat-messages">
                <!-- Messages will appear here -->
            </main>

        </div>

        <!-- Profile Modal Overlay -->
        <div id="profile-modal-overlay" class="modal-overlay hidden">
            <div class="profile-modal">
                <button id="close-profile-btn" class="close-modal-btn" title="Close">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
                <div class="profile-avatar">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                </div>
                <h2>Account Profile</h2>
                <div class="profile-info">
                    <div class="info-group">
                        <label>Email Address</label>
                        <p id="profile-email">Loading...</p>
                    </div>
                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
        <script src="theme.js"></script>
        <script type="module" src="script.js"></script>
</body>

</html>
